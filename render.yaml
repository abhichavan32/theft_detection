services:
  - type: web
    name: electricity-theft-detection
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn electricity_theft_detection.wsgi:application --bind 0.0.0.0:10000
    pythonVersion: 3.11
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        scope: runtime_and_build
      - key: SECRET_KEY
        scope: runtime_and_build
        sync: false
      - key: DATABASE_URL
        scope: runtime_and_build
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
