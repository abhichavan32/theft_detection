{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Run Analysis | Electricity Theft Detection</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <header>
            <h1><i class="fa-solid fa-flask" style="color: var(--accent-primary);"></i> Run Analysis</h1>
            <p>Enter electricity consumption data for real-time inference</p>
        </header>

        <nav>
            <a href="{% url 'theft_detection:index' %}"><i class="fa-solid fa-house"></i> Dashboard</a>
            <a href="{% url 'theft_detection:predictions_list' %}"><i class="fa-solid fa-chart-column"></i> History</a>
            <a href="{% url 'theft_detection:predict_page' %}"><i class="fa-solid fa-flask"></i> Run Analysis</a>
            <a href="/admin/"><i class="fa-solid fa-gear"></i> Admin</a>
        </nav>

        <div class="form-container">
            <h2>Meter Analysis Form</h2>
            <form id="predictionForm">
                {% csrf_token %}
                <div class="form-row">
                    <div class="form-group" style="flex: 100%;">
                        <label for="meter_id">Meter ID</label>
                        <input type="text" id="meter_id" name="meter_id" placeholder="e.g., MTR-9999" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="daily_consumption">Daily Consumption (kWh)</label>
                        <input type="number" step="0.1" id="daily_consumption" name="daily_consumption" placeholder="e.g., 45.5" required>
                    </div>

                    <div class="form-group">
                        <label for="monthly_consumption">Monthly Consumption (kWh)</label>
                        <input type="number" step="0.1" id="monthly_consumption" name="monthly_consumption" placeholder="e.g., 1365" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="peak_hours_consumption">Peak Hours Consumption (kWh)</label>
                        <input type="number" step="0.1" id="peak_hours_consumption" name="peak_hours_consumption" placeholder="e.g., 28.3" required>
                    </div>

                    <div class="form-group">
                        <label for="off_peak_hours_consumption">Off-Peak Hours Consumption (kWh)</label>
                        <input type="number" step="0.1" id="off_peak_hours_consumption" name="off_peak_hours_consumption" placeholder="e.g., 17.2" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="voltage_variation">Voltage Variation (V)</label>
                        <input type="number" step="0.1" id="voltage_variation" name="voltage_variation" placeholder="e.g., 2.5" required>
                    </div>

                    <div class="form-group">
                        <label for="current_variation">Current Variation (A)</label>
                        <input type="number" step="0.1" id="current_variation" name="current_variation" placeholder="e.g., 1.2" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="power_factor">Power Factor (0-1)</label>
                        <input type="number" step="0.01" min="0" max="1" id="power_factor" name="power_factor" placeholder="e.g., 0.95" required>
                    </div>

                    <div class="form-group">
                        <label for="reactive_power">Reactive Power (kVAR)</label>
                        <input type="number" step="0.1" id="reactive_power" name="reactive_power" placeholder="e.g., 5.8" required>
                    </div>
                </div>

                <button type="submit"><i class="fa-solid fa-magnifying-glass" style="margin-right: 0.5rem;"></i> Predict Theft Status</button>
            </form>

            <div class="loading" id="loading"></div>

            <div class="error" id="error"></div>

            <div class="result" id="result"></div>
        </div>

        <footer>
            <p>&copy; 2026 Electricity Theft Detection System | Advanced Analysis Engine</p>
        </footer>
    </div>

    <script src="{% static 'js/animations.js' %}"></script>
    <script>
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const result = document.getElementById('result');
            
            loading.classList.add('show');
            error.textContent = '';
            result.innerHTML = '';
            
            try {
                const formData = new FormData(document.getElementById('predictionForm'));
                const response = await fetch('{% url "theft_detection:predict_api" %}', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });

                const data = await response.json();
                loading.classList.remove('show');

                if (response.ok) {
                    const prediction = data.voting_prediction === 'theft' ? 'theft' : 'normal';
                    const icon = prediction === 'theft' ? '<i class="fa-solid fa-circle-exclamation"></i>' : '<i class="fa-solid fa-circle-check"></i>';
                    
                    result.className = `result show ${prediction}`;
                    result.innerHTML = `
                        <h3>${icon} ${prediction.toUpperCase()} - Confidence: ${(data.confidence * 100).toFixed(1)}%</h3>
                        <div class="result-details">
                            <div class="detail-item">
                                <strong>LOF Algorithm</strong>
                                <span>${data.lof_prediction.toUpperCase()}</span>
                            </div>
                            <div class="detail-item">
                                <strong>LOF Score</strong>
                                <span>${data.lof_score.toFixed(4)}</span>
                            </div>
                            <div class="detail-item">
                                <strong>Isolation Forest</strong>
                                <span>${data.if_prediction.toUpperCase()}</span>
                            </div>
                            <div class="detail-item">
                                <strong>IF Score</strong>
                                <span>${data.if_score.toFixed(4)}</span>
                            </div>
                            <div class="detail-item">
                                <strong>Vote Agreement</strong>
                                <span>${data.votes}/2</span>
                            </div>
                        </div>
                    `;
                    window.showToast('Prediction completed successfully!', 'success');
                } else {
                    error.className = 'error';
                    error.textContent = data.error || 'An error occurred during prediction';
                    window.showToast('Prediction failed', 'error');
                }
            } catch (err) {
                loading.classList.remove('show');
                error.className = 'error';
                error.textContent = 'Network error: ' + err.message;
                window.showToast('Network error', 'error');
            }
        });
    </script>
</body>

</html>
