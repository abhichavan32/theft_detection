{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict New Data</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>

<body>
    <div class="container">
        <header>
            <h1>🔮 Run Analysis</h1>
            <p>Enter electricity consumption data for inference</p>
        </header>

        <nav>
            <a href="{% url 'theft_detection:index' %}">Dashboard</a>
            <a href="{% url 'theft_detection:predictions_list' %}">History</a>
            <a href="{% url 'theft_detection:predict_page' %}">Run Analysis</a>
            <a href="/admin/">Admin</a>
        </nav>

        <div class="form-container">
            <form id="predictionForm">
                {% csrf_token %}
                <div class="form-group">
                    <label for="daily_consumption">Daily Consumption (kWh)</label>
                    <input type="number" step="0.1" id="daily_consumption" name="daily_consumption" required>
                </div>

                <div class="form-group">
                    <label for="monthly_consumption">Monthly Consumption (kWh)</label>
                    <input type="number" step="0.1" id="monthly_consumption" name="monthly_consumption" required>
                </div>

                <div class="form-group">
                    <label for="peak_hours_consumption">Peak Hours Consumption (kWh)</label>
                    <input type="number" step="0.1" id="peak_hours_consumption" name="peak_hours_consumption" required>
                </div>

                <div class="form-group">
                    <label for="off_peak_hours_consumption">Off-Peak Hours Consumption (kWh)</label>
                    <input type="number" step="0.1" id="off_peak_hours_consumption" name="off_peak_hours_consumption"
                        required>
                </div>

                <div class="form-group">
                    <label for="voltage_variation">Voltage Variation (V)</label>
                    <input type="number" step="0.1" id="voltage_variation" name="voltage_variation" required>
                </div>

                <div class="form-group">
                    <label for="current_variation">Current Variation (A)</label>
                    <input type="number" step="0.1" id="current_variation" name="current_variation" required>
                </div>

                <div class="form-group">
                    <label for="power_factor">Power Factor (0-1)</label>
                    <input type="number" step="0.01" min="0" max="1" id="power_factor" name="power_factor" required>
                </div>

                <div class="form-group">
                    <label for="reactive_power">Reactive Power (kVAR)</label>
                    <input type="number" step="0.1" id="reactive_power" name="reactive_power" required>
                </div>

                <button type="submit">🔍 Predict Theft Status</button>
            </form>

            <div class="loading" id="loading">⏳ Making prediction...</div>

            <div class="error" id="error"></div>

            <div class="result" id="result"></div>
        </div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const result = document.getElementById('result');

            loading.classList.add('show');
            error.classList.remove('show');
            result.classList.remove('show');

            const formData = new FormData(e.target);
            const data = {
                daily_consumption: parseFloat(formData.get('daily_consumption')),
                monthly_consumption: parseFloat(formData.get('monthly_consumption')),
                peak_hours_consumption: parseFloat(formData.get('peak_hours_consumption')),
                off_peak_hours_consumption: parseFloat(formData.get('off_peak_hours_consumption')),
                voltage_variation: parseFloat(formData.get('voltage_variation')),
                current_variation: parseFloat(formData.get('current_variation')),
                power_factor: parseFloat(formData.get('power_factor')),
                reactive_power: parseFloat(formData.get('reactive_power')),
            };

            try {
                const response = await fetch('/api/electricity-data/predict/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCSRFToken(),
                    },
                    body: JSON.stringify(data)
                });

                const responseData = await response.json();

                if (!response.ok) {
                    throw new Error(responseData.error || 'Prediction failed');
                }

                const resultDiv = document.getElementById('result');
                const prediction = responseData.voting_prediction;
                const isFraud = prediction === 'theft';

                resultDiv.className = `result show ${prediction}`;
                resultDiv.innerHTML = `
                    <h3>${isFraud ? '⚠️ THEFT DETECTED!' : '✅ NORMAL USAGE'}</h3>
                    <div class="result-details">
                        <div class="detail-item">
                            <strong>Voting Prediction:</strong>
                            ${prediction.toUpperCase()}
                        </div>
                        <div class="detail-item">
                            <strong>Confidence:</strong>
                            ${(responseData.confidence * 100).toFixed(1)}%
                        </div>
                        <div class="detail-item">
                            <strong>LOF Prediction:</strong>
                            ${responseData.lof_prediction.toUpperCase()}
                        </div>
                        <div class="detail-item">
                            <strong>LOF Score:</strong>
                            ${responseData.lof_score.toFixed(4)}
                        </div>
                        <div class="detail-item">
                            <strong>Isolation Forest:</strong>
                            ${responseData.if_prediction.toUpperCase()}
                        </div>
                        <div class="detail-item">
                            <strong>IF Score:</strong>
                            ${responseData.if_score.toFixed(4)}
                        </div>
                    </div>
                `;
            } catch (err) {
                error.classList.add('show');
                error.textContent = 'Error: ' + err.message;
            } finally {
                loading.classList.remove('show');
            }
        });

        function getCSRFToken() {
            let token = document.querySelector('[name=csrfmiddlewaretoken]')?.value || '';
            if (!token) {
                // Try to get from cookie
                const name = 'csrftoken';
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }
                return cookieValue;
            }
            return token;
        }
    </script>
</body>

</html>
